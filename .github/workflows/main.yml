name: Build APK with Buildozer
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool libtool-bin pkg-config cmake python3-pip openjdk-17-jdk-headless zip unzip

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer
        # Фиксируем версию pip, чтобы избежать конфликтов внутри среды p4a
        pip install "pip<24.0"

    - name: Build APK with Buildozer
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        # Отключаем проверку обновлений pip при сборке
        export PIP_DISABLE_PIP_VERSION_CHECK=1
        yes | buildozer -v android debug --no-compile-pyc

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: calorie-tracker-apk
        path: bin/*.apk
