name: Build APK with Buildozer
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config cmake python3-pip openjdk-17-jdk-headless zip unzip

    - name: Install Buildozer and Cython
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install Cython buildozer virtualenv textwrap3

    - name: Force Python 3.10 in buildozer.spec
      run: |
        # Переконуємось, що в spec файлі правильна вимога
        if [ -f buildozer.spec ]; then
          sed -i 's/^requirements =.*/requirements = python3==3.10.14,kivy==2.3.0/' buildozer.spec
        else
          echo "ERROR: buildozer.spec not found!"
          exit 1
        fi
        cat buildozer.spec | grep requirements

    - name: Clean previous builds
      run: |
        rm -rf .buildozer bin
        buildozer android clean

    - name: Build APK with Buildozer
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        export PATH=$PATH:$HOME/.local/bin
        # Ігноруємо попередження про deprecated функції
        export CFLAGS="-Wno-deprecated-declarations"
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: calorie-tracker-apk
        path: bin/*.apk
